name: Scrape SUTRA medidas (temas)

on:
  workflow_dispatch:
  schedule:
    # Corre diariamente a las 6:15am Puerto Rico (~10:15 UTC, ajusta si quieres)
    - cron: "00 7 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Debug - show http_get signature
        run: |
          python -c "import inspect; import src.sutra_scraper as s; print(inspect.signature(s.http_get)); print(s.__file__)"
      
      - name: Run scraper
        run: |
          python -m src.sutra_scraper --max-pages 200 --delay 0.25 --out data/medidas_filtradas.json

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/medidas_filtradas.json
          git commit -m "Update medidas_filtradas.json" || echo "No changes"
          git push

      - name: Install CA certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
