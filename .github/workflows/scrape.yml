name: Scrape SUTRA medidas (temas)

on:
  workflow_dispatch:
  schedule:
    # 6:00am Puerto Rico = 10:00 UTC (PR no usa DST)
    - cron: "00 02 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install CA certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Debug - show http_get signature
        run: |
          python -c "import inspect; import sutra_watch.py as s; print(inspect.signature(s.http_get)); print(s.__file__)"

      - name: Run scraper
        run: |
          python -m sutra_watch.py --max-pages 200 --delay 0.25 --timeout 60 --out data/medidas_filtradas.json

      - name: Debug - list outputs
        run: |
          ls -la
          ls -la data || true

      - name: Commit results
        run: |
          if [ ! -f "data/medidas_filtradas.json" ]; then
            echo "No existe data/medidas_filtradas.json; nada que commitear."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/medidas_filtradas.json
          git commit -m "Update medidas_filtradas.json" || echo "No changes"
          git push
