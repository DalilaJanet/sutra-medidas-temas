name: Scrape SUTRA medidas (temas)

on:
  workflow_dispatch:
  schedule:
    # Corre diariamente a las 6:15am Puerto Rico (~10:15 UTC, ajusta si quieres)
    - cron: "15 10 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python src/sutra_scraper.py --max-pages 200 --delay 0.25 --out data/medidas_filtradas.json

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/medidas_filtradas.json
          git commit -m "Update medidas_filtradas.json" || echo "No changes"
          git push
