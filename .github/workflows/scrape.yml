name: Scrape SUTRA medidas (temas)

on:
  workflow_dispatch:
  schedule:
    # 6:00am Puerto Rico = 10:00 UTC
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install CA certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Debug - show scraper file
        run: |
          python -c "from src import sutra_watch as s; print(s.__file__)"

      - name: Run script
        env:
          ZAPIER_HOOK_URL: ${{ secrets.ZAPIER_HOOK_URL }}
          STATE_PATH: state.json
        run: python -m src.sutra_watch

      - name: Commit results
        run: |
          if [ ! -f "data/medidas_filtradas.json" ]; then
            echo "No existe data/medidas_filtradas.json; nada que commitear."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/medidas_filtradas.json
          git commit -m "Update medidas_filtradas.json" || echo "No changes"
          git push
